<!DOCTYPE html>
<html lang="zh-CN" class="light" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Toolbox</title>
  <meta name="description" content="记录和分享常用的软件、网站与工具。">
  <link rel="stylesheet" href="src/css/main.css">
</head>
<body data-page="home">
  <div class="app-container">
    <header class="site-header">
      <nav class="site-nav">
        <a href="index.html" class="site-logo">My Toolbox</a>
        <div class="site-nav-links">
          <a href="index.html" class="site-nav-link" data-nav-key="home">首页</a>
          <a href="writing-guide.html" class="site-nav-link" data-nav-key="guide">写作指南</a>
        </div>
        <div class="nav-actions">
          <a href="https://github.com" target="_blank" rel="noopener noreferrer" aria-label="GitHub" class="github-link">GH</a>
          <button class="mobile-menu-btn" aria-label="菜单" type="button">
            <span aria-hidden="true">☰</span>
          </button>
        </div>
      </nav>
    </header>

    <main class="site-main">
      <section class="hero-section fade-in">
        <h1 class="hero-title">我的工具箱</h1>
        <p class="hero-subtitle">把常用工具写成 Markdown，网站会自动生成首页模块和详情页。</p>
        <div class="hero-search">
          <div class="ds-input search-input">
            <span class="search-icon" aria-hidden="true">⌕</span>
            <input type="search" data-tool-search placeholder="搜索工具、分类或标签">
          </div>
        </div>
      </section>

      <div class="category-filters" data-category-filters aria-label="工具分类"></div>
      <div class="tools-sections" data-tools-sections></div>
    </main>

    <footer class="site-footer">
      <p>内容来自 <code>content/tools/*.md</code> · 适合静态部署</p>
    </footer>
  </div>

  <script type="module" src="src/js/main.js"></script>
</body>
</html>
